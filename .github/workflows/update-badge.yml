name: Update Badge

on:
  workflow_run:
    workflows: ["Test Templates"]
    types: [completed]

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download badge
        run: |
          mkdir -p assets
          curl -sL \
            "https://github.com/${{ github.repository }}/actions/workflows/test-templates-pr.yml/badge.svg" \
            -o assets/test-templates-badge.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/test-templates-badge.svg
          git diff --staged --quiet || (git commit -m "chore: update test badge" && git push)
